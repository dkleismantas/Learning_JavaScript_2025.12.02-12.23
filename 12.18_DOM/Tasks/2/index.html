
<!doctype html>
<html lang="lt">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CSS Eglutė su burbuliukais</title>
<style>
  :root{
    --bg: #0b132b;
    --snow: #e8f1ff;
    --tree-dark: #0f5d3f;
    --tree-mid: #137954;
    --tree-light: #18a06a;
    --trunk: #6b3f22;
    --star: #ffd65a;
    --shadow: rgba(0,0,0,.2);

    /* Burbuliukų spalvos */
    --ball-red: #f44336;
    --ball-blue: #2196f3;
    --ball-gold: #ffca28;
    --ball-green: #4caf50;
    --ball-pink: #ff6fb3;
    --ball-violet: #9c27b0;
  }

  html,body {
    height: 100%;
  }

  body{
    margin:0;
    background:
      radial-gradient(1200px 800px at 70% -10%, #13294b 0%, var(--bg) 40%),
      radial-gradient(1200px 800px at 0% 120%, #0a1a33 0%, var(--bg) 45%);
    color:#fff;
    display:grid;
    place-items:center;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, sans-serif;
  }

  .scene{
    width: min(92vw, 680px);
    aspect-ratio: 1 / 1.1;
    position: relative;
    filter: drop-shadow(0 18px 20px var(--shadow));
  }

  /* Žvaigždė viršuje */
  .star{
    position:absolute;
    left:50%;
    transform: translateX(-50%);
    top: 7%;
    width: 64px; 
    height: 64px;
    background: conic-gradient(from 0deg, var(--star), #fff386 20%, var(--star) 40%, #ffd65a 60%, #fff386 80%, var(--star) 100%);
    clip-path: polygon(
      50% 0%, 61% 35%, 98% 35%, 68% 57%,
      79% 91%, 50% 70%, 21% 91%, 32% 57%,
      2% 35%, 39% 35%
    );
    box-shadow: 0 0 12px 4px rgba(255,214,90,.6), 0 0 32px 10px rgba(255,255,160,.25);
  }

  /* Eglės sluoksniai – trys trikampiai su šiek tiek skirtingais atspalviais */
  .tree{
    position:absolute;
    inset: 10% 10% 18% 10%;
  }

  .layer{
    position:absolute;
    left:50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 220px solid transparent;
    border-right: 220px solid transparent;
    border-bottom: 200px solid var(--tree-mid);
    filter: drop-shadow(0 8px 6px rgba(0,0,0,.25));
  }
  .layer:nth-child(1){
    top: 6%;
    border-left-width: 140px;
    border-right-width: 140px;
    border-bottom-width: 120px;
    border-bottom-color: var(--tree-light);
    z-index: 3;
  }
  .layer:nth-child(2){
    top: 20%;
    border-left-width: 180px;
    border-right-width: 180px;
    border-bottom-width: 160px;
    border-bottom-color: var(--tree-mid);
    z-index: 2;
  }
  .layer:nth-child(3){
    top: 38%;
    border-left-width: 230px;
    border-right-width: 230px;
    border-bottom-width: 210px;
    border-bottom-color: var(--tree-dark);
    z-index: 1;
  }

  /* Snaigės fonui (smulkus šventinis efektas) */
  .scene::before{
    content:"";
    position:absolute; inset:0;
    background:
      radial-gradient(circle at 20% 10%, var(--snow) 0 1px, transparent 2px) 0 0/80px 80px,
      radial-gradient(circle at 60% 30%, var(--snow) 0 1px, transparent 2px) 0 0/100px 100px,
      radial-gradient(circle at 85% 15%, var(--snow) 0 1px, transparent 2px) 0 0/90px 90px,
      radial-gradient(circle at 30% 70%, var(--snow) 0 1px, transparent 2px) 0 0/110px 110px;
    opacity:.35;
    pointer-events:none;
  }

  /* Kamienas */
  .trunk{
    position:absolute;
    left:50%; transform: translateX(-50%);
    bottom: 25%;
    width: 70px; 
    height: 90px;
    background: linear-gradient(#7c4a2a, var(--trunk));
    border-radius: 10px;
    box-shadow: inset 0 0 0 2px rgba(0,0,0,.08), 0 8px 10px rgba(0,0,0,.3);
  }

  /* Burbuliukai */
  .baubles{
    position:absolute; inset: 12% 14% 20% 14%;
    list-style:none; margin:0; padding:0;
    z-index: 10;
  }

  .baubles li{
    position:absolute;
    width: 22px; 
    height: 22px;
    border-radius: 50%;
    background: var(--ball-red);
    box-shadow:
      inset 3px 3px 6px rgba(255,255,255,.35),
      inset -4px -6px 12px rgba(0,0,0,.28),
      0 2px 6px rgba(0,0,0,.35);
  }

  /* Maža „kepurėlė“ virš burbuliuko */
  .baubles li::before{
    content:"";
    position:absolute; top:-6px; left:50%; transform:translateX(-50%);
    width:10px; height:6px;
    border-radius: 2px 2px 0 0;
    background: #c8c8c8;
    box-shadow: inset 0 -1px 0 rgba(0,0,0,.25);
  }

  /* Įvairios spalvos per nth-child */
  .baubles li:nth-child(6n+1){ background: var(--ball-red); }
  .baubles li:nth-child(6n+2){ background: var(--ball-blue); }
  .baubles li:nth-child(6n+3){ background: var(--ball-gold); }
  .baubles li:nth-child(6n+4){ background: var(--ball-green); }
  .baubles li:nth-child(6n+5){ background: var(--ball-pink); }
  .baubles li:nth-child(6n+6){ background: var(--ball-violet); }

  /* Minkšta pulsacija – subtilus „švytėjimas“ */
  @keyframes pulse {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 0 4px rgba(255,255,255,.25)); }
    50%  { transform: scale(1.08); filter: drop-shadow(0 0 10px rgba(255,255,255,.45)); }
  }
  .baubles li { animation: pulse 3.8s ease-in-out infinite; }
  .baubles li:nth-child(odd){ animation-duration: 3.2s; }
  .baubles li:nth-child(3n){ animation-duration: 4.4s; }

  /* Pozicijos eglutėje (išdėstome ant trikampių zonos) */
  /* Viršutinė dalis */
  .b1 { top: 14%; left: 49%; }
  .b2 { top: 19%; left: 38%; }
  .b3 { top: 22%; left: 60%; }
  .b4 { top: 26%; left: 47%; }

  /* Vidurinė dalis */
  .b5 { top: 33%; left: 32%; }
  .b6 { top: 36%; left: 56%; }
  .b7 { top: 40%; left: 42%; }
  .b8 { top: 44%; left: 66%; }
  .b9 { top: 46%; left: 25%; }

  /* Apatinė dalis */
  .b10 { top: 52%; left: 35%; }
  .b11 { top: 56%; left: 50%; }
  .b12 { top: 58%; left: 68%; }
  .b13 { top: 60%; left: 22%; }
  .b14 { top: 64%; left: 44%; }
  .b15 { top: 66%; left: 58%; }
  .b16 { top: 70%; left: 75%; }
  .b17 { top: 70%; left: 33%; }
  .b18 { top: 72%; left: 15%; }

  /* Eglutės „žemė“ */
  .ground{
    position:absolute; 
    left:50%; 
    transform:translateX(-50%);
    bottom: 20%;
    width: 70%;
    height: 16px;
    background: radial-gradient(60% 60% at 50% 50%, rgba(255,255,255,.35), rgba(255,255,255,.06) 60%, transparent 70%);
    filter: blur(1px);
  }

  .holiday-greeting{
    position:absolute; 
    left:50%;
    bottom: 15%; 
    transform:translateX(-50%);
  }

  /* Prieinamumas */
  .visually-hidden{ 
    position:absolute!important; width:1px; height:1px; margin:-1px; padding:0; border:0; clip:rect(0 0 0 0); overflow:hidden; white-space:nowrap;
  }
</style>
</head>
<body>
  <main class="scene" role="img" aria-label="Kalėdinė eglutė su žvaigžde ir spalvotais burbuliukais">

    <div class="star" id="star"></div>

    <div class="tree">
      <div class="layer layer1"></div>
      <div class="layer layer2"></div>
      <div class="layer layer3"></div>
    </div>

    <ul class="baubles">
      <li class="b1" ></li>
      <li class="b2"></li>
      <li class="b3"></li>
      <li class="b4"></li>
      <li class="b5"></li>
      <li class="b6"></li>
      <li class="b7"></li>
      <li class="b8"></li>
      <li class="b9"></li>
      <li class="b10"></li>
      <li class="b11"></li>
      <li class="b12"></li>
      <li class="b13"></li>
      <li class="b14"></li>
      <li class="b15"></li>
      <li class="b16"></li>
      <li class="b17"></li>
      <li class="b18"></li>
    </ul>

    <div class="trunk" aria-hidden="true"></div>
    <div class="ground" aria-hidden="true"></div>

    <div class="holiday-greeting">Sveikinimas!</div>     

    
  </main>

<script src="script.js"></script>

</body>
